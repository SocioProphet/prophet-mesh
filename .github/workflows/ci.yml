name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check src tests
      - run: python -m pytest
      - run: prophet-mesh validate-blueprint blueprints/michael-agent.yaml
      - run: prophet-mesh validate-blueprint blueprints/premium-custom-agent.yaml
      - run: prophet-mesh validate-choir specs/agent-choir.yaml
      - run: prophet-mesh validate-repo-state specs/repo-state.yaml
      - run: prophet-mesh validate-intake examples/customer-intake.accepted.json
      - run: '! prophet-mesh validate-intake examples/customer-intake.rejected.json'
      - run: prophet-mesh validate-evaluation examples/evaluation-report.accepted.json
      - run: '! prophet-mesh validate-evaluation examples/evaluation-report.rejected.json'
