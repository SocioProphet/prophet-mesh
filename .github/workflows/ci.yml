name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check src tests
      - run: python -m pytest
      - run: prophet-mesh validate-agent-registry agents
      - run: prophet-mesh validate-blueprint blueprints/michael-agent.yaml
      - run: prophet-mesh validate-blueprint blueprints/premium-custom-agent.yaml
      - run: prophet-mesh validate-choir specs/agent-choir.yaml
      - run: prophet-mesh validate-repo-state specs/repo-state.yaml
      - run: prophet-mesh validate-router specs/model-router-interface.yaml
      - run: prophet-mesh validate-model-policy specs/model-task-policy.yaml
      - run: prophet-mesh validate-router-decision examples/router-decision.accepted.json
      - run: '! prophet-mesh validate-router-decision examples/router-decision.rejected.json'
      - run: prophet-mesh dry-run-router examples/router-request.email.json
      - run: prophet-mesh run-runtime examples/router-request.email.json --output artifacts/runtime/router-request.email.runtime.json
      - run: python -m json.tool artifacts/runtime/router-request.email.runtime.json >/dev/null
      - run: prophet-mesh validate-choir-plan examples/choir-execution-plan.accepted.json
      - run: '! prophet-mesh validate-choir-plan examples/choir-execution-plan.rejected.json'
      - run: prophet-mesh validate-conductor-response examples/conductor-response.accepted.json
      - run: '! prophet-mesh validate-conductor-response examples/conductor-response.rejected.json'
      - run: prophet-mesh validate-execution-trace examples/execution-trace.accepted.json
      - run: '! prophet-mesh validate-execution-trace examples/execution-trace.rejected.json'
      - run: prophet-mesh validate-intake examples/customer-intake.accepted.json
      - run: '! prophet-mesh validate-intake examples/customer-intake.rejected.json'
      - run: prophet-mesh validate-evaluation examples/evaluation-report.accepted.json
      - run: '! prophet-mesh validate-evaluation examples/evaluation-report.rejected.json'
