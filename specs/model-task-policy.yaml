name: prophet-mesh-model-task-policy
version: 0.1.0
product: Prophet Mesh
purpose: task and domain routing policy for the Agent Choir through the single model-router interface

invariants:
  - conductor_routes_every_task
  - task_policy_is_explicit
  - domain_policy_is_explicit
  - hosted_models_are_optional_routes
  - open_models_are_first_class_routes
  - private_tasks_prefer_private_routes
  - customer_routes_are_tenant_isolated
  - image_and_media_routes_are_separate_from_text_routes
  - office_routes_preserve_document_intent
  - communications_routes_preserve_relationship_context
  - research_routes_require_evidence
  - coding_routes_require_tests_or_review

model_families:
  hosted_frontier:
    preferred:
      - openai.gpt-5.5
      - anthropic.claude-opus-4.8
      - google.gemini-3.1-pro
    role: highest-capability hosted reasoning, coding, research, and multimodal fallback
  hosted_balanced:
    preferred:
      - anthropic.claude-sonnet-4.6
      - openai.gpt-5.4-mini
      - google.gemini-3.5-flash
    role: default hosted productivity, coding, office, and conversational work
  hosted_fast:
    preferred:
      - anthropic.claude-haiku-4.5
      - google.gemini-3-flash
      - openai.gpt-5.4-mini
    role: fast chat, email, text replies, triage, classification, and summarization
  open_private:
    preferred:
      - meta_llama.llama-4-maverick
      - meta_llama.llama-4-scout
      - qwen.qwen3-235b-a22b
      - qwen.qwen3-32b
      - mistral.mistral-large-3
    role: private, local, self-hosted, customer, and sovereign routes
  code_specialist:
    preferred:
      - anthropic.claude-sonnet-4.6
      - openai.gpt-5.5
      - mistral.codestral
      - qwen.qwen3-32b
    role: code generation, review, repair, and repository patching
  reasoning_specialist:
    preferred:
      - openai.gpt-5.5
      - anthropic.claude-opus-4.8
      - deepseek.deepseek-r1
      - qwen.qwen3-235b-a22b
    role: math, proof, planning, complex research, and adversarial reasoning
  image_specialist:
    preferred:
      - openai.gpt-image-2
      - google.nano-banana-pro
      - google.nano-banana-2
      - stability.stable-diffusion-3.5
    role: image generation, image editing, design composition, and private image routes
  media_specialist:
    preferred:
      - google.veo-3.1
      - google.gemini-3.1-flash-live
      - google.gemini-3.1-flash-tts
      - openai.gpt-realtime-2
    role: video, voice, realtime dialogue, and text-to-speech
  document_specialist:
    preferred:
      - openai.gpt-5.5
      - anthropic.claude-sonnet-4.6
      - mistral.ocr
      - google.gemini-3.5-flash
    role: office documents, OCR, editing, redlining, extraction, and document transformation

  vision_understanding:
    preferred:
      - qwen.qwen3-vl
      - meta_llama.llama-4-scout
      - openai.gpt-5.5
      - google.gemini-3.1-pro
    role: image/screenshot/document understanding (VLM) — distinct from image generation
  reranker:
    preferred:
      - qwen.qwen3-reranker
      - baai.bge-reranker-v2
      - mixedbread.mxbai-rerank
    role: cross-encoder reranking of retrieved candidates (the second half of RAG / hellgraph grounding)
  guard:
    preferred:
      - meta_llama.llama-guard-4
      - qwen.qwen3-guard
      - google.shieldgemma-2
    role: safety/policy classification, jailbreak + content moderation for the governance-sentinel + trust kernel
  embeddings:
    preferred:
      - qwen.qwen3-embedding
      - baai.bge-m3
      - nomic.nomic-embed-text
    role: dense text/code embeddings for retrieval, memory, and hellgraph indexing

task_routes:
  - task: chat
    domain: relationship
    primary_family: hosted_balanced
    private_family: open_private
    required_controls: [memory_scope, identity, policy, audit]
    specialist_agents: [memory-steward]
  - task: text_message_reply
    domain: communications
    primary_family: hosted_fast
    private_family: open_private
    required_controls: [relationship_context, memory_scope, policy]
    specialist_agents: [memory-steward, writing-agent]
  - task: email_reply
    domain: communications
    primary_family: hosted_balanced
    private_family: open_private
    required_controls: [relationship_context, evidence, policy, audit]
    specialist_agents: [writing-agent, governance-sentinel]
  - task: office_document_creation
    domain: office
    primary_family: document_specialist
    private_family: open_private
    required_controls: [document_intent, evidence, audit]
    specialist_agents: [writing-agent, planning-agent]
  - task: office_document_editing
    domain: office
    primary_family: document_specialist
    private_family: open_private
    required_controls: [document_intent, provenance, audit]
    specialist_agents: [writing-agent]
  - task: research
    domain: evidence
    primary_family: hosted_frontier
    private_family: open_private
    required_controls: [evidence, citations, audit]
    specialist_agents: [research-agent, analytics-agent]
  - task: coding
    domain: software
    primary_family: code_specialist
    private_family: open_private
    required_controls: [tests, review, audit]
    specialist_agents: [coding-agent, governance-sentinel]
  - task: code_review
    domain: software
    primary_family: code_specialist
    private_family: open_private
    required_controls: [diff_scope, tests, review, audit]
    specialist_agents: [coding-agent]
  - task: image_generation
    domain: creative_media
    primary_family: image_specialist
    private_family: image_specialist
    required_controls: [prompt_trace, policy, provenance]
    specialist_agents: [creative-agent]
  - task: image_editing
    domain: creative_media
    primary_family: image_specialist
    private_family: image_specialist
    required_controls: [source_image_scope, policy, provenance]
    specialist_agents: [creative-agent]
  - task: video_generation
    domain: creative_media
    primary_family: media_specialist
    private_family: media_specialist
    required_controls: [prompt_trace, policy, provenance]
    specialist_agents: [creative-agent]
  - task: analytics
    domain: data
    primary_family: reasoning_specialist
    private_family: open_private
    required_controls: [dataset_scope, evidence, audit]
    specialist_agents: [analytics-agent]
  - task: operations_plan
    domain: operations
    primary_family: hosted_balanced
    private_family: open_private
    required_controls: [authority, approval_boundary, audit]
    specialist_agents: [operations-agent, planning-agent, governance-sentinel]
  - task: legal_compliance_draft
    domain: governed_professional
    primary_family: hosted_frontier
    private_family: open_private
    required_controls: [evidence, human_review_required, audit]
    specialist_agents: [research-agent, writing-agent, governance-sentinel]
  - task: scientific_reasoning
    domain: science_math
    primary_family: reasoning_specialist
    private_family: open_private
    required_controls: [evidence, uncertainty, peer_review_flag]
    specialist_agents: [research-agent, analytics-agent]
